---
# =============================================================================
# kolla-ansible globals.yml
# OpenStack 2024.2 (Dalmatian) on Ubuntu 22.04
# 단일노드 AIO (Hyper-V VM) — eth0 관리 / eth1 외부 / qemu
# =============================================================================

# --- Basic Settings ----------------------------------------------------------
kolla_base_distro: "ubuntu"
openstack_release: "2024.2"
kolla_internal_vip_address: "192.168.0.84"   # 단일노드: 노드 IP 직결 (haproxy off)

# --- Network Interfaces -----------------------------------------------------
# 관리/API 네트워크 (단일노드 VM: eth0 = os-mgmt)
network_interface: "eth0"

# Neutron 외부 (Provider/FIP) 네트워크 인터페이스 (단일노드 VM: eth1 = os-ext)
neutron_external_interface: "eth1"

# ── HAProxy / Keepalived ───────────────────────────────────────────────────────
# 단일노드 AIO: haproxy/keepalived 비활성화 → API를 노드 IP에 직접 바인딩
enable_haproxy: "no"

# --- Nova (Compute) ---------------------------------------------------------
# 이 호스트는 VBS 잠금으로 중첩 가상화(KVM) 불가 → qemu 소프트웨어 에뮬레이션 확정
nova_compute_virt_type: "qemu"

# Compute 노드 추가를 위한 SSH 활성화
enable_nova_ssh: "yes"

# --- Neutron (Networking) ----------------------------------------------------
enable_neutron_provider_networks: "no"
neutron_global_physnet_mtu: 1500

# --- Service Enablement ------------------------------------------------------
enable_glance: "yes"       # 이미지 서비스
enable_heat: "no"          # 오케스트레이션 (20GB 메모리 절약 위해 비활성화)
enable_horizon: "yes"      # 웹 대시보드
enable_nova: "yes"         # 컴퓨트
enable_neutron: "yes"      # 네트워킹
enable_cinder: "yes"       # 블록 스토리지 (sdb LVM 사용)

# --- Cinder LVM Settings -----------------------------------------------------
# 01_deploy_aio.sh에서 sdb(60G)에 LVM VG 'cinder-volumes' 자동 생성
enable_cinder_backend_lvm: "yes"
enable_iscsid: "yes"
cinder_volume_group: "cinder-volumes"

# --- Database Settings (AIO Optimized) ---------------------------------------
mariadb_expected_num_nodes: 1     # AIO 환경에서 동기화 대기 방지
database_port: 3306               # HAProxy 미사용 시 기본 포트 명시
mariadb_bind_address: "0.0.0.0"   # 모든 인터페이스 바인딩 (로컬 접속 원활화)
enable_proxysql: "no"             # AIO 환경에서 MariaDB와의 포트(3306) 충돌 방지

# --- Optional Services -------------------------------------------------------
enable_barbican: "no"      # 시크릿 관리
enable_octavia: "no"       # 로드밸런서
enable_designate: "no"     # DNS
